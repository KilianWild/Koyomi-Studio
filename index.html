         </section>
         <section class="input-section-container">
            <h1 class="koyomi-studio-title">
               <span class="font-poppin font-bold">Koyomi Studio</span> - カレンダー作成ツール
            </h1>
            <form data-js="koyomi-studio-form">
               <fieldset class="input-collection__fieldset">
                  <h3 class="input-collection__title">
                     <span class="input-collection__title-font">Base Settings</span>
                  </h3>

                  <article class="input-collection__container">
                     <label for="form-inputYear" class="input-collection__section-left">Calendar Year:</label>
                     <section class="input-collection__section-right">
                        <input
                           id="form-inputYear"
                           class="input-field"
                           name="inputYear"
                           type="number"
                           maxlength="4"
                           min="1999"
                           max="9999"
                           placeholder="Year"
                        />
                        <span class="japanese-units">年</span>
                     </section>
                  </article>

                  <article class="input-collection__container">
                     <label for="form-inputStartMonth" class="input-collection__section-left">Starting Month:</label>
                     <section class="input-collection__section-right">
                        <input
                           id="form-inputStartMonth"
                           class="input-field"
                           name="inputStartMonth"
                           type="number"
                           maxlength="2"
                           min="1"
                           max="12"
                           placeholder="Month"
                        />
                        <span class="japanese-units">月</span>
                     </section>
                  </article>

                  <article class="input-collection__container">
                     <label for="form-inputNrOfMonth" class="input-collection__section-left">Number of Months:</label>
                     <section class="input-collection__section-right">
                        <input
                           id="form-inputNrOfMonth"
                           class="input-field"
                           name="inputNrOfMonth"
                           type="number"
                           maxlength="2"
                           min="1"
                           max="24"
                           placeholder="Nr. of Months"
                        />
                        <span class="japanese-units">か月</span>
                     </section>
                  </article>
               </fieldset>

               <fieldset class="input-collection__fieldset">
                  <h3 class="input-collection__title">
                     <span class="input-collection__title-font">Advanced Settings</span>
                  </h3>

                  <article class="input-collection__container">
                     <label for="form-inputStartMonth" class="input-collection__section-left">Starting Month:</label>
                     <section class="input-collection__section-right">
                        <select class="input-field" name="" id="">
                           <option value="0">月曜日</option>
                           <option value="1">火曜日</option>
                           <option value="2">水曜日</option>
                           <option value="3">木曜日</option>
                           <option value="4">金曜日</option>
                           <option value="5">土曜日</option>
                           <option value="6" selected>日曜日</option>
                        </select>
                        <span></span>
                     </section>
                  </article>

                  <article class="input-collection__container">
                     <label for="form-inputColor" class="input-collection__section-left">Calendar Color:</label>
                     <section class="input-collection__section-right">
                        <input
                           id="form-inputColor"
                           class="input-field"
                           name="inputColor"
                           type="color"
                           placeholder="Nr. of Months"
                        />
                        <span class="japanese-units"></span>
                     </section>
                  </article>

                  <div class="input-collection__button-containter">
                     <button type="button" class="input-collection__button" data-js="button-start-build">Clear</button>
                     <button type="button" class="input-collection__button" data-js="button-start-build">
                        Standard
                     </button>
                     <button
                        type="submit"
                        class="input-collection__button button-position__right"
                        data-js="button-start-build"
                     >
                        Build
                     </button>
                  </div>
               </fieldset>
            </form>
         </section>

         <div class="koyomi__container">
            <div class="koyomi__days-layout">
               <div class="koyomi__vertical-lines"></div>
               <div class="koyomi__vertical-lines"></div>
               <div class="koyomi__vertical-lines"></div>
               <div class="koyomi__vertical-lines"></div>
               <div class="koyomi__vertical-lines"></div>
               <div class="koyomi__vertical-lines"></div>
               <div class="koyomi__horizontal-lines"></div>
            </div>
         </div>
