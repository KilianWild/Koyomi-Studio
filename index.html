         <div class="screen-wrapper">
            <!-- Koyomi Settings -->
            <section class="koyomi-studio__container koyomi-studio__container--active" data-js="koyomi-studio__container">
               <form data-js="koyomi-studio_form">
                  <fieldset class="koyomi-studio__fieldset">
                     <h3 class="koyomi-studio__fieldset-title">
                        <span class="koyomi-studio__title-font">Base Settings</span>
                     </h3>

                     <article class="koyomi-studio__input-container">
                        <label for="form-inputYear" class="koyomi-studio__input-container-section-left">Calendar Year:</label>
                        <section class="koyomi-studio__input-container-section-right">
                           <input
                              id="form-inputYear"
                              class="koyomi-studio__input-field"
                              name="inputYear"
                              type="number"
                              maxlength="4"
                              min="1999"
                              max="9999"
                              placeholder="Year"
                              data-js="form-inputYear"
                           />
                           <span class="japanese-units">年</span>
                        </section>
                     </article>

                     <article class="koyomi-studio__input-container">
                        <label for="form-inputStartMonth" class="koyomi-studio__input-container-section-left"
                           >Starting Month:</label
                        >
                        <section class="koyomi-studio__input-container-section-right">
                           <input
                              id="form-inputStartMonth"
                              class="koyomi-studio__input-field"
                              name="inputStartMonth"
                              type="number"
                              maxlength="2"
                              min="1"
                              max="12"
                              placeholder="Month"
                              data-js="form-inputMonth"
                           />
                           <span class="japanese-units">月</span>
                        </section>
                     </article>

                     <article class="koyomi-studio__input-container">
                        <label for="form-inputNrOfMonth" class="koyomi-studio__input-container-section-left"
                           >Number of Months:</label
                        >
                        <section class="koyomi-studio__input-container-section-right">
                           <input
                              id="form-inputNrOfMonth"
                              class="koyomi-studio__input-field"
                              name="inputNrOfMonth"
                              type="number"
                              maxlength="2"
                              min="1"
                              max="24"
                              value="1"
                              placeholder="Nr. of Months"
                           />
                           <span class="japanese-units">か月</span>
                        </section>
                     </article>
                  </fieldset>

                  <fieldset class="koyomi-studio__fieldset">
                     <h3 class="koyomi-studio__fieldset-title">
                        <span class="koyomi-studio__title-font">Advanced Settings</span>
                     </h3>

                     <article class="koyomi-studio__input-container">
                        <label for="form-inputFirstWeekday" class="koyomi-studio__input-container-section-left"
                           >First Weekday:</label
                        >
                        <section class="koyomi-studio__input-container-section-right">
                           <select class="koyomi-studio__input-field" name="inputFirstWeekday" id="form-inputFirstWeekday">
                              <option value="1">月曜日</option>
                              <option value="2">火曜日</option>
                              <option value="3">水曜日</option>
                              <option value="4">木曜日</option>
                              <option value="5">金曜日</option>
                              <option value="6">土曜日</option>
                              <option value="0" selected>日曜日</option>
                           </select>
                           <span></span>
                        </section>
                     </article>

                     <div class="koyomi-studio__button-containter">
                        <button type="button" class="koyomi-studio__button" data-js="button-start-build">Clear</button>
                        <button type="button" class="koyomi-studio__button" data-js="button-start-build">Standard</button>
                        <button
                           type="submit"
                           class="koyomi-studio__button koyomi-studio__button--position-right"

                        >
                           Build
                        </button>

                  </fieldset>
               </form>
            </section>

            <!-- Koyomi Construct -->
            <section class="koyomi-builder__container" data-js="koyomi-builder__container">
               <div class="koyomi-builder__print-sizing">
                  <div class="koyomi-builder__print-margin">
                     <svg viewBox="0 0 1000 1000" preserveAspectRatio="none" data-js="svg"></svg>
                  </div>
               </div>
            </section>
