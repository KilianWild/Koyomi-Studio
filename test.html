<!doctype html>
<html lang="en">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Document</title>
   </head>
   <body>
      <svg viewBox="0 0 600 150">
         <defs>
            <mask id="reveal-mask">
               <!-- Animate a white rectangle over black background -->
               <rect x="0" y="0" width="600" height="150" fill="black" />
               <text
                  x="50%"
                  y="50%"
                  text-anchor="middle"
                  dominant-baseline="middle"
                  font-size="100px"
                  fill="white"
                  class="draw-text"
               >
                  Hello
               </text>
            </mask>
         </defs>

         <!-- Colored text revealed by the mask -->
         <rect width="600" height="150" fill="orange" mask="url(#reveal-mask)" />
      </svg>
   </body>
</html>

<style>
   .draw-text {
      stroke: none; /* No stroke */
      fill: white; /* Mask color */

      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;

      animation: draw 3s linear forwards;
   }

   @keyframes draw {
      to {
         stroke-dashoffset: 0;
      }
   }
</style>
